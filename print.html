<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온마음 · 말씀 사진관</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF4E8; --paper-deep:#F2E8D5;
    --ink:#2B2620; --ink-soft:#6B6152;
    --sea:#1E6E68; --sea-deep:#0F4844;
    --persimmon:#C96A3B; --persimmon-deep:#A84F26;
    --line:#D9CBB2; --card:#FFFDF8; --ok:#2E7D4F;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Gowun Batang',serif;background:var(--paper);color:var(--ink);min-height:100vh;
    background-image:radial-gradient(circle at 15% 8%, rgba(201,106,59,.05), transparent 40%),
                     radial-gradient(circle at 88% 92%, rgba(30,110,104,.06), transparent 45%);
  }
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 60px}
  header{display:flex;align-items:baseline;justify-content:space-between}
  .brand{font-family:'Gaegu',cursive;font-weight:700;font-size:1.5rem;color:var(--sea-deep)}
  .brand small{font-size:.9rem;color:var(--persimmon);margin-left:6px}
  .gear{border:none;background:none;font-size:1.2rem;cursor:pointer;color:var(--ink-soft);padding:6px}
  .sub{font-size:.8rem;color:var(--ink-soft);margin:4px 0 18px;border-bottom:1px solid var(--line);padding-bottom:14px}

  .status{
    display:flex;align-items:center;gap:8px;font-family:'Gaegu',cursive;font-size:1rem;
    padding:9px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);
    color:var(--ink-soft);margin-bottom:16px;justify-content:center;
  }
  .dot{width:10px;height:10px;border-radius:50%;background:#B8AB93}
  .status.on{border-color:var(--ok);color:var(--ok)}
  .status.on .dot{background:var(--ok)}

  label{display:block;font-size:.85rem;color:var(--ink-soft);margin:14px 0 6px;font-weight:700}
  input[type=text]{
    width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;
    background:var(--card);font-family:'Gowun Batang',serif;font-size:1.15rem;color:var(--ink);
  }
  input:focus{outline:2px solid var(--sea);border-color:transparent}
  .chips{display:flex;gap:8px;margin-top:4px}
  .chip{
    padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);
    font-family:'Gaegu',cursive;font-size:1.05rem;cursor:pointer;color:var(--ink-soft);transition:.15s
  }
  .chip.sel{background:var(--persimmon);border-color:var(--persimmon);color:#fff}

  /* 페이지 내 카메라 */
  .cam-view{
    position:fixed;inset:0;background:#000;z-index:100;display:none;
    flex-direction:column;align-items:center;justify-content:center;
  }
  .cam-view.show{display:flex}
  .cam-view video{width:100%;max-height:70vh;object-fit:contain;background:#000}
  .cam-view video.mirror{transform:scaleX(-1)}
  .cam-controls{display:flex;align-items:center;gap:26px;padding:22px 0}
  .cam-snap{
    width:84px;height:84px;border-radius:50%;border:5px solid #fff;background:var(--persimmon);
    cursor:pointer;box-shadow:0 0 0 6px rgba(255,255,255,.25);
  }
  .cam-side{
    width:56px;height:56px;border-radius:50%;border:none;background:rgba(255,255,255,.18);
    color:#fff;font-size:1.5rem;cursor:pointer;
  }
  .cam-fallback{
    background:none;border:none;color:rgba(255,255,255,.75);font-family:'Gowun Batang',serif;
    font-size:.85rem;text-decoration:underline;cursor:pointer;padding-bottom:18px;
  }
  .cam-side.on{background:var(--persimmon)}
  .cam-count{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-family:'Gaegu',cursive;font-size:9rem;color:#fff;font-weight:700;
    text-shadow:0 4px 24px rgba(0,0,0,.6);pointer-events:none;
  }
  .cam-count.show{display:flex}

  .big-shoot{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    width:100%;padding:34px 0;margin-top:20px;border:none;border-radius:20px;cursor:pointer;
    background:radial-gradient(circle at 35% 25%, #2A8F88, var(--sea-deep));color:#fff;
    font-family:'Gaegu',cursive;font-size:1.7rem;font-weight:700;
    box-shadow:0 8px 26px rgba(15,72,68,.3);transition:.15s;
  }
  .big-shoot:active{transform:scale(.98)}
  .big-shoot span{font-size:.95rem;font-weight:400;opacity:.85;font-family:'Gowun Batang',serif}

  .btn{
    display:block;width:100%;padding:15px;border:none;border-radius:14px;margin-top:12px;
    background:var(--sea);color:#fff;font-family:'Gaegu',cursive;font-size:1.25rem;font-weight:700;
    cursor:pointer;transition:.15s;
  }
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:var(--card);color:var(--sea-deep);border:1.5px solid var(--sea)}
  .btn.warm{background:var(--persimmon)}
  .btn:disabled{opacity:.45;cursor:default}
  .row{display:flex;gap:10px}
  .row .btn{flex:1}

  .preview-area{display:none;margin-top:20px}
  .preview-frame{
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:18px;
    display:flex;justify-content:center;box-shadow:0 4px 16px rgba(43,38,32,.08);
  }
  #previewCanvas{
    width:100%;max-width:300px;image-rendering:pixelated;
    border:1px solid var(--line);background:#fff;
  }
  .verse-tag{
    text-align:center;font-family:'Gaegu',cursive;color:var(--persimmon-deep);
    font-size:1.05rem;margin-top:12px;line-height:1.5;
  }

  .notice{margin-top:14px;font-size:.8rem;color:var(--ink-soft);background:var(--paper-deep);border-radius:10px;padding:10px 13px;line-height:1.65}
  .notice.err{color:#8C3B2A;background:#F6E4DC}
  .notice b{color:var(--sea-deep)}

  .modal-bg{position:fixed;inset:0;background:rgba(43,38,32,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:var(--paper);border-radius:20px 20px 0 0;padding:24px 20px 34px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
  .modal h3{font-family:'Gaegu',cursive;color:var(--sea-deep);margin-bottom:4px}
  .modal p{font-size:.78rem;color:var(--ink-soft);line-height:1.6}
  input[type=range]{width:100%;accent-color:var(--persimmon);margin-top:6px}
  .range-val{font-family:'Gaegu',cursive;color:var(--persimmon-deep);font-size:1rem}

  .progress{display:none;margin-top:14px;text-align:center;font-family:'Gaegu',cursive;color:var(--sea-deep);font-size:1.05rem}
  .bar{height:8px;background:var(--paper-deep);border-radius:6px;overflow:hidden;margin-top:8px}
  .bar i{display:block;height:100%;width:0%;background:var(--persimmon);transition:width .2s;border-radius:6px}

  .dbg{
    display:none;margin-top:14px;background:#1e1b17;color:#9fd3c7;border-radius:10px;
    padding:10px 12px;font-family:monospace;font-size:.7rem;line-height:1.55;
    max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">온마음 <small>말씀 사진관</small></div>
    <button class="gear" id="gearBtn" aria-label="설정">⚙</button>

    <div class="progress" id="prog">
      <span id="progText">인쇄 중…</span>

  <div class="notice" id="mainNotice">
    <b>처음 설정:</b> 프린터 전원을 켜고 [🖨 인쇄하기]를 누르면 블루투스 기기 선택창이 떠요. GB / GT / MX / YT로 시작하는 이름을 선택하면 연결됩니다. 한 번 연결하면 계속 유지돼요.<br>
    ※ 안드로이드 크롬에서 작동합니다 (아이패드 불가)

</div>

<!-- 페이지 내 카메라 -->
<div class="cam-view" id="camView">

  <div style="color:rgba(255,255,255,.85);font-size:.85rem;padding-top:10px;font-family:'Gowun Batang',serif">💡 밝은 쪽(창문·조명)을 바라보면 얼굴이 환하게 나와요</div>

<div class="modal-bg" id="modalBg">

<script>
/* ================= 안전 저장소 ================= */
const mem = {};
const store = {
  get(k){ try { return localStorage.getItem(k) ?? mem[k] ?? null; } catch(e){ return mem[k] ?? null; } },
  set(k,v){ mem[k]=v; try { localStorage.setItem(k,v); } catch(e){} }
};
const $ = id => document.getElementById(id);

/* ================= 축복 말씀 풀 ================= */
const VERSES = [
  ["여호와는 네게 복을 주시고 너를 지키시기를 원하며","민수기 6:24"],
  ["내가 너와 함께 있어 네가 어디로 가든지 너를 지키리라","창세기 28:15"],
  ["너는 내 것이라 내가 너를 지명하여 불렀나니","이사야 43:1"],
  ["네 시작은 미약하였으나 네 나중은 심히 창대하리라","욥기 8:7"],
  ["여호와는 나의 목자시니 내게 부족함이 없으리로다","시편 23:1"],
  ["수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라","마태복음 11:28"],
  ["두려워하지 말라 내가 너와 함께 함이라","이사야 41:10"],
  ["너희는 세상의 빛이라","마태복음 5:14"],
  ["항상 기뻐하라 쉬지 말고 기도하라 범사에 감사하라","데살로니가전서 5:16-18"],
  ["내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라","빌립보서 4:13"],
  ["사랑은 오래 참고 사랑은 온유하며","고린도전서 13:4"],
  ["백발은 영화의 면류관이라 공의로운 길에서 얻으리라","잠언 16:31"],
  ["너희가 노년에 이르기까지 내가 그리하겠고 백발이 되기까지 내가 너희를 품을 것이라","이사야 46:4"],
  ["그런즉 믿음, 소망, 사랑, 이 세 가지는 항상 있을 것인데 그 중의 제일은 사랑이라","고린도전서 13:13"],
  ["주께서 너를 만나심은 복의 근원이 되게 하려 하심이라","창세기 12:2"],
  ["평안을 너희에게 끼치노니 곧 나의 평안을 너희에게 주노라","요한복음 14:27"],
  ["여호와를 의지하는 자는 시온 산이 흔들리지 아니하고 영원히 있음 같도다","시편 125:1"],
  ["나의 영혼아 여호와를 송축하며 그의 모든 은택을 잊지 말지어다","시편 103:2"],
  ["의인은 종려나무 같이 번성하며 레바논의 백향목 같이 성장하리로다","시편 92:12"],
  ["그가 네 길을 지도하시리라 너는 마음을 다하여 여호와를 신뢰하라","잠언 3:5-6"],
  ["선을 행하다가 낙심하지 말지니 포기하지 아니하면 때가 이르매 거두리라","갈라디아서 6:9"],
  ["우는 자들과 함께 울라 즐거워하는 자들과 함께 즐거워하라","로마서 12:15"],
  ["여호와께서 너희를 향한 생각은 평안이요 재앙이 아니니라","예레미야 29:11"],
  ["눈물을 흘리며 씨를 뿌리는 자는 기쁨으로 거두리로다","시편 126:5"],
];
let verseIdx = Math.floor(Math.random()*VERSES.length);

/* ================= 설정값 ================= */
const cfg = {
  get church(){ return store.get('om_church') || '평해감리교회'; },
  set church(v){ store.set('om_church', v); },
  get footer(){ return store.get('om_footer') || '온마음 · 예수님이 사랑하십니다'; },
  set footer(v){ store.set('om_footer', v); },
  get energy(){ return parseInt(store.get('om_energy')||'5'); },
  set energy(v){ store.set('om_energy', v); },
  get bright(){ return parseInt(store.get('om_bright')||'15'); },
  set bright(v){ store.set('om_bright', v); },
};

/* ================= 카드 합성 ================= */
const W = 384; // 고양이 프린터 인쇄 폭(픽셀)
let photoBitmap = null;

async function loadPhoto(file){
  try{
    photoBitmap = await createImageBitmap(file, { imageOrientation:'from-image' });
  }catch(e){
    photoBitmap = await new Promise((res,rej)=>{
      const img = new Image();
      img.onload = ()=>res(img);
      img.onerror = rej;
      img.src = URL.createObjectURL(file);
    });
  }
}

/* 히스토그램 기반 자동 명암 보정:
   - 2%~98% 퍼센타일을 0~255로 스트레치 (역광의 극단 명암 완화)
   - 사진의 중앙 밝기가 어두울수록 감마를 강하게 걸어 얼굴 톤을 끌어올림 */
function autoEnhance(c, brightOffset){
  const x = c.getContext('2d');
  const img = x.getImageData(0,0,c.width,c.height);
  const d = img.data;
  const n = c.width*c.height;
  const hist = new Uint32Array(256);
  const lum = new Float32Array(n);
  for(let i=0;i<n;i++){
    const l = 0.299*d[i*4] + 0.587*d[i*4+1] + 0.114*d[i*4+2];
    lum[i] = l; hist[l|0]++;
  }
  let acc=0, lo=0, hi=255;
  for(let v=0;v<256;v++){ acc+=hist[v]; if(acc>=n*0.02){ lo=v; break; } }
  acc=0;
  for(let v=255;v>=0;v--){ acc+=hist[v]; if(acc>=n*0.02){ hi=v; break; } }
  if(hi-lo<10){ lo=0; hi=255; }
  acc=0; let med=128;
  for(let v=0;v<256;v++){ acc+=hist[v]; if(acc>=n/2){ med=v; break; } }
  const medN = Math.max(0.02, Math.min(0.98, (med-lo)/(hi-lo)));
  let gamma = Math.log(0.5)/Math.log(medN);  // 중앙 밝기를 중간톤으로 보내는 감마
  gamma = Math.max(0.45, Math.min(1.15, gamma));
  const off = brightOffset||0;
  const lut = new Uint8Array(256);
  for(let v=0;v<256;v++){
    let t = (v-lo)/(hi-lo); t = Math.max(0, Math.min(1, t));
    t = Math.pow(t, gamma);
    lut[v] = Math.max(0, Math.min(255, (t*255+off)|0));
  }
  for(let i=0;i<n;i++){
    const g = lut[lum[i]|0];
    d[i*4]=d[i*4+1]=d[i*4+2]=g;
  }
  x.putImageData(img,0,0);
}

function wrapText(ctx, text, maxW){
  const words = text.split(' ');
  const lines = []; let line = '';
  for(const w of words){
    const t = line ? line+' '+w : w;
    if(ctx.measureText(t).width > maxW && line){ lines.push(line); line = w; }
    else line = t;
  }
  if(line) lines.push(line);
  return lines;
}

function buildCard(){
  const [verse, ref] = VERSES[verseIdx];
  const name = $('elderName').value.trim();
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');

  // --- 높이 계산을 위한 가측정 ---
  const photoH = photoBitmap ? Math.round(W * Math.min(1.15, photoBitmap.height/photoBitmap.width)) : 0;
  ctx.font = '700 30px "Gowun Batang", serif';
  const verseLines = wrapText(ctx, verse, W-56);
  const nameBlock = name ? 74 : 0;
  const H = 8+34+18 + photoH + 14 + nameBlock + 20 + verseLines.length*44 + 34 + 22 + 40 + 44;
  c.width = W; c.height = H;

  // --- 배경 ---
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#000'; ctx.textAlign = 'center';
  let y = 8;

  // 상단: 교회명 + 날짜
  ctx.font = '700 26px "Gaegu", cursive';
  ctx.fillText(cfg.church, W/2, y+24); y += 34;
  ctx.font = '18px "Gowun Batang", serif';
  const d = new Date();
  ctx.fillText(`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`, W/2, y+14); y += 18;

  // 사진 (자동 명암 보정)
  if(photoBitmap){
    y += 8;
    const srcRatio = photoBitmap.width/photoBitmap.height;
    const dstRatio = W/photoH;
    let sx=0, sy=0, sw=photoBitmap.width, sh=photoBitmap.height;
    if(srcRatio > dstRatio){ sw = sh*dstRatio; sx = (photoBitmap.width-sw)/2; }
    else { sh = sw/dstRatio; sy = (photoBitmap.height-sh)/2; }
    const pc = document.createElement('canvas');
    pc.width = W; pc.height = photoH;
    pc.getContext('2d').drawImage(photoBitmap, sx,sy,sw,sh, 0,0, W, photoH);
    autoEnhance(pc, cfg.bright);          // 어두운 사진일수록 강하게 밝힘
    ctx.drawImage(pc, 0, y);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(1,y+1,W-2,photoH-2);
    y += photoH + 14;
  }

  // 성함 (입력한 호칭 그대로 표시)
  if(name){
    ctx.font = '700 44px "Gaegu", cursive';
    ctx.fillText(name, W/2, y+44); y += 74;
  }

  // 구분선 (점선)
  ctx.setLineDash([6,6]); ctx.beginPath();
  ctx.moveTo(30,y); ctx.lineTo(W-30,y); ctx.stroke(); ctx.setLineDash([]);
  y += 20;

  // 말씀
  ctx.font = '700 30px "Gowun Batang", serif';
  for(const line of verseLines){ y += 44; ctx.fillText(line, W/2, y); }
  y += 34;
  ctx.font = '20px "Gowun Batang", serif';
  ctx.fillText('— ' + ref + ' —', W/2, y); y += 22;

  // 하단 문구
  ctx.font = '22px "Gaegu", cursive';
  ctx.fillText(cfg.footer, W/2, y+26);

  return c;
}

/* --- 플로이드-스타인버그 디더링 (1비트) --- */
function ditherCanvas(src){
  const w = src.width, h = src.height;
  const ctx = src.getContext('2d');
  const img = ctx.getImageData(0,0,w,h);
  const px = img.data;
  const g = new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    g[i] = 0.299*px[i*4] + 0.587*px[i*4+1] + 0.114*px[i*4+2];
  }
  const out = new Uint8Array(w*h); // 1 = 검정
  for(let yy=0;yy<h;yy++){
    for(let xx=0;xx<w;xx++){
      const i = yy*w+xx;
      const old = g[i];
      const nv = old < 128 ? 0 : 255;
      out[i] = nv===0 ? 1 : 0;
      const err = old - nv;
      if(xx+1<w) g[i+1] += err*7/16;
      if(yy+1<h){
        if(xx>0) g[i+w-1] += err*3/16;
        g[i+w] += err*5/16;
        if(xx+1<w) g[i+w+1] += err*1/16;
      }
    }
  }
  // 미리보기 반영
  for(let i=0;i<w*h;i++){
    const v = out[i] ? 0 : 255;
    px[i*4]=px[i*4+1]=px[i*4+2]=v; px[i*4+3]=255;
  }
  ctx.putImageData(img,0,0);
  return out; // 1비트 배열 (인쇄용)
}

/* ================= 고양이 프린터 (Web Bluetooth) ================= */
let btDevice = null, btChar = null, btData = null, btNotify = null;

function log(msg){
  const d = $('dbg');
  d.style.display = 'block';
  const t = new Date().toTimeString().slice(0,8);
  d.textContent += `[${t}] ${msg}\n`;
  d.scrollTop = d.scrollHeight;
}
function hex(u8){ return Array.from(u8).map(b=>b.toString(16).padStart(2,'0')).join(' '); }

function crc8(data){
  let c = 0;
  for(const b of data){
    c ^= b;
    for(let i=0;i<8;i++) c = (c & 0x80) ? ((c<<1)^0x07)&0xFF : (c<<1)&0xFF;
  }
  return c;
}
/* 방식 A(표준 고양이 프린터, iPrint 계열): 0x51 0x78 프레임 */
function pkt(cmd, payload){
  const p = Uint8Array.from(payload);
  const buf = new Uint8Array(8 + p.length);
  buf.set([0x51,0x78,cmd,0x00,p.length&0xFF,(p.length>>8)&0xFF],0);
  buf.set(p,6);
  buf[6+p.length] = crc8(p);
  buf[7+p.length] = 0xFF;
  return buf;
}
/* 방식 B(신형/변종 펌웨어, MXW01·SC 계열 추정): 0x22 0x21 프레임 */
function pktB(cmd, payload){
  const p = Uint8Array.from(payload);
  const buf = new Uint8Array(8 + p.length);
  buf.set([0x22,0x21,cmd,0x00,p.length&0xFF,(p.length>>8)&0xFF],0);
  buf.set(p,6);
  buf[6+p.length] = crc8(p);
  buf[7+p.length] = 0xFF;
  return buf;
}
const LATTICE_START = [0xAA,0x55,0x17,0x38,0x44,0x5F,0x5F,0x5F,0x44,0x38,0x2C];
const LATTICE_END   = [0xAA,0x55,0x17,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x17];

async function connectPrinter(){
  const SVC1 = 0xae30, SVC2 = 0xaf30;
  btDevice = await navigator.bluetooth.requestDevice({
    filters:[
      {services:[SVC1]}, {services:[SVC2]},
      {namePrefix:'GB0'},{namePrefix:'GT0'},{namePrefix:'YT0'},
      {namePrefix:'MX0'},{namePrefix:'MX1'},{namePrefix:'MXW'},{namePrefix:'MXTP'},
      {namePrefix:'SC0'},{namePrefix:'SC1'},
    ],
    optionalServices:[SVC1, SVC2],
  });
  btDevice.addEventListener('gattserverdisconnected', ()=>{ setPrStatus(false); log('연결 끊김'); });
  const server = await btDevice.gatt.connect();
  let svc;
  try{ svc = await server.getPrimaryService(SVC1); log('서비스 0xAE30'); }
  catch(e){ svc = await server.getPrimaryService(SVC2); log('서비스 0xAF30'); }

  btChar = await svc.getCharacteristic(0xae01);
  log('제어 특성 0xAE01 확보');

  // 데이터 특성(0xAE03) — 신형 프로토콜용. 없으면 무시
  btData = null;
  try{ btData = await svc.getCharacteristic(0xae03); log('데이터 특성 0xAE03 확보'); }
  catch(e){ log('0xAE03 없음 (구형 프로토콜로 추정)'); }

  // 알림 구독 — 프린터가 보내는 응답을 로그로 확인
  try{
    btNotify = await svc.getCharacteristic(0xae02);
    await btNotify.startNotifications();
    btNotify.addEventListener('characteristicvaluechanged', e=>{
      log('◀ 프린터 응답: ' + hex(new Uint8Array(e.target.value.buffer)));
    });
    log('알림(0xAE02) 구독 완료');
  }catch(e){ log('알림 구독 실패: '+e.message); }

  setPrStatus(true, btDevice.name);
  log('연결됨: ' + btDevice.name);
}
function setPrStatus(on, name){
  const s = $('prStatus');
  s.classList.toggle('on', on);
  $('prStatusText').textContent = on ? ('프린터 연결됨: '+name) : '프린터 연결 안 됨 (이미지 저장은 가능)';
}

async function writeChunks(char, bytes, onProgress, chunkSize, delayMs){
  const CHUNK = chunkSize || 100;
  const DELAY = delayMs ?? 25;
  for(let i=0;i<bytes.length;i+=CHUNK){
    const part = bytes.slice(i, i+CHUNK);
    if(char.writeValueWithoutResponse) await char.writeValueWithoutResponse(part);
    else await char.writeValue(part);
    if(onProgress) onProgress(Math.min(1, (i+CHUNK)/bytes.length));
    await new Promise(r=>setTimeout(r, DELAY));
  }
}
const sendAll = (bytes, onProgress)=>writeChunks(btChar, bytes, onProgress);

async function ensureConnected(){
  if(!navigator.bluetooth){
    showErr('이 브라우저는 블루투스를 지원하지 않아요. 안드로이드 크롬에서 열어 주세요. (아이패드/사파리 불가)');
    return false;
  }
  try{
    if(!btChar || !btDevice?.gatt?.connected) await connectPrinter();
    return true;
  }catch(e){
    log('연결 실패: '+e.message);
    showErr('프린터 연결이 취소되었거나 실패했어요. 프린터 전원과 블루투스를 확인하고 다시 시도해 주세요.');
    return false;
  }
}

function rowsFromBits(bits, w, h){
  const rowBytes = w >> 3;
  const rows = [];
  for(let y=0;y<h;y++){
    const row = new Uint8Array(rowBytes);
    for(let x=0;x<w;x++){
      if(bits[y*w+x]) row[x>>3] |= (1 << (x & 7)); // LSB 우선, 1=검정
    }
    rows.push(row);
  }
  return rows;
}

/* ---------- 방식 A: 표준 고양이 프린터 ---------- */
function buildPrintJob(bits, w, h){
  const parts = [];
  const energy = Math.round(0x2000 + (cfg.energy/10) * 0xC000);
  parts.push(pkt(0xA4,[0x32]));
  parts.push(pkt(0xAF,[energy & 0xFF, (energy>>8)&0xFF]));
  parts.push(pkt(0xBE,[0x00]));
  parts.push(pkt(0xA6, LATTICE_START));
  for(const row of rowsFromBits(bits,w,h)) parts.push(pkt(0xA2, row));
  parts.push(pkt(0xBD,[0x19]));
  parts.push(pkt(0xA1,[0x80,0x00]));   // 인쇄 후 배출(128줄) — 찢을 때 하단 문구 보호
  parts.push(pkt(0xA6, LATTICE_END));
  const total = parts.reduce((s,p)=>s+p.length,0);
  const all = new Uint8Array(total);
  let o=0; for(const p of parts){ all.set(p,o); o+=p.length; }
  return all;
}

async function doPrint(bits, h){
  if(!(await ensureConnected())) return;
  log(`방식 A 인쇄 시작 (${W}x${h})`);
  const job = buildPrintJob(bits, W, h);
  $('prog').style.display='block';
  $('progText').textContent = '인쇄 중… (방식 A)';
  try{
    await sendAll(job, p=>{ $('progBar').style.width = Math.round(p*100)+'%'; });
    log('방식 A 전송 완료 ('+job.length+' bytes)');
    $('progText').textContent = '전송 완료! 종이가 안 나오면 [방식 B로 인쇄]를 눌러 보세요';
    setTimeout(()=>{ $('prog').style.display='none'; $('progBar').style.width='0%'; }, 6000);
  }catch(e){
    $('prog').style.display='none';
    log('방식 A 오류: '+e.message);
    showErr('인쇄 도중 연결이 끊겼어요. 프린터를 껐다 켜고 다시 시도해 주세요.');
    btChar = null;
  }
}

/* ---------- 방식 B: 신형/변종 펌웨어 (실험적) ---------- */
async function doPrintB(bits, h){
  if(!(await ensureConnected())) return;
  log(`방식 B 인쇄 시작 (${W}x${h})`);
  $('prog').style.display='block';
  $('progText').textContent = '인쇄 중… (방식 B)';
  try{
    const intensity = Math.round(0x20 + (cfg.energy/10)*0x60); // 진하기
    await writeChunks(btChar, pktB(0xA2,[intensity]), null);          // 농도 설정
    log('▶ B: 농도 '+intensity);
    await writeChunks(btChar, pktB(0xA9,[h&0xFF,(h>>8)&0xFF,0x30,0x00]), null); // 인쇄 요청(줄 수)
    log('▶ B: 인쇄 요청 '+h+'줄');
    await new Promise(r=>setTimeout(r,150));
    // 비트맵을 프레임 없이 통째로 데이터 특성에 전송 (없으면 제어 특성으로)
    const rows = rowsFromBits(bits,W,h);
    const raw = new Uint8Array(rows.length*48);
    rows.forEach((r,i)=>raw.set(r,i*48));
    const target = btData || btChar;
    log('▶ B: 비트맵 '+raw.length+' bytes → '+(btData?'0xAE03':'0xAE01'));
    await writeChunks(target, raw, p=>{ $('progBar').style.width = Math.round(p*100)+'%'; }, 180, 18);
    await writeChunks(btChar, pktB(0xAD,[0x00]), null);               // 마무리(flush)
    log('▶ B: 전송 완료');
    $('progText').textContent = '방식 B 전송 완료! 결과를 확인해 주세요';
    setTimeout(()=>{ $('prog').style.display='none'; $('progBar').style.width='0%'; }, 6000);
  }catch(e){
    $('prog').style.display='none';
    log('방식 B 오류: '+e.message);
    showErr('방식 B 인쇄 중 오류가 났어요. 화면 아래 로그를 캡처해 공유해 주세요.');
  }
}
function showErr(msg){
  const n = $('mainNotice');
  n.classList.add('err');
  n.innerHTML = msg;
  setTimeout(()=>{ n.classList.remove('err'); n.innerHTML = '<b>처음 설정:</b> 프린터 전원을 켜고 [🖨 인쇄하기]를 누르면 블루투스 기기 선택창이 떠요. GB / GT / MX / YT / SC로 시작하는 이름을 선택하면 연결됩니다.'; }, 8000);
}

$('gearBtn').onclick = ()=>{ syncSettings(); $('modalBg').classList.add('show'); };
$('modalBg').onclick = e=>{ if(e.target===$('modalBg')) $('modalBg').classList.remove('show'); };
$('closeSettings').onclick = ()=>{ $('modalBg').classList.remove('show'); if(photoBitmap) renderPreview(); };
$('churchName').onchange = e=>{ cfg.church = e.target.value.trim() || '평해감리교회'; };
$('footerText').onchange = e=>{ cfg.footer = e.target.value.trim() || '온마음 · 예수님이 사랑하십니다'; };
$('energy').oninput = e=>{ cfg.energy = e.target.value; $('energyVal').textContent = e.target.value+' / 10'; };
$('bright').oninput = e=>{ cfg.bright = e.target.value; $('brightVal').textContent = (e.target.value>0?'+':'')+e.target.value; };
</script>
</body>
</html>
